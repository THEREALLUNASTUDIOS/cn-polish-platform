  <script>

    // ============================================================
    // CODE GENERATION
    // ============================================================
    function generatePolishCode(genre, sliders, userName) {
      const g = GENRES.find(x => x.id === genre);
      const date = new Date().toISOString().split('T')[0];
      const traits = g.profile.traits.split(' · ').map(t => `  - ${t}`).join('\n');
      return `# ═══════════════════════════════════════════════
# CREATIVE NAVIGATION POLISH CODE
# Custom configuration for: ${userName || 'Writer'}
# Generated: ${date}
# ═══════════════════════════════════════════════

genre_base: ${g.id}

# ═══ RHYTHM ═══
rhythm:
  avg_sentence_length: ${sliders.sentence}
  variation: 0.70
  paragraph_target: ${sliders.sentence < 10 ? 3 : sliders.sentence > 15 ? 5 : 4}

# ═══ IMAGERY ═══
imagery:
  density: ${(sliders.imagery / 100).toFixed(2)}
  metaphor_frequency: ${sliders.metaphor}

# ═══ EMOTION ═══
emotion:
  amplification: ${(sliders.emotion / 100).toFixed(2)}

# ═══ DIALOGUE ═══
dialogue:
  prose_ratio: ${(sliders.dialogue / 100).toFixed(2)}
  tag_frequency: 3
  action_beats: high

# ═══ SIGNATURE TRAITS ═══
signature:
${traits}

# ═══ FORBIDDEN ═══
forbidden:
  - "suddenly" (show the sudden thing)
  - "very" or "really" as intensifiers
  - adverbs attached to dialogue tags
  - passive voice in action sequences
  - telling emotions that should be shown`;
    }

    function generateClaudePrompt(codeYaml) {
      return `I'm using my Creative Navigation polish code to refine a draft. Here's my code:

\`\`\`yaml
${codeYaml}
\`\`\`

I'll paste my draft next. Please rewrite it to match every parameter above. Keep my plot, characters, and dialogue meaning — only change the prose to fit the code. Return only the polished prose, no commentary.`;
    }

    // ============================================================
    // AUTH
    // ============================================================
    async function checkUser() {
      const { data } = await sb.auth.getUser();
      currentUser = data?.user || null;
      updateNav();
      if (currentUser && currentView === 'landing') {
        showView('dashboard');
      }
    }

    function updateNav() {
      const userPill = document.getElementById('user-pill');
      const signinBtn = document.getElementById('signin-btn');
      const signoutBtn = document.getElementById('signout-btn');
      if (currentUser) {
        userPill.textContent = currentUser.email;
        userPill.classList.remove('hidden');
        signinBtn.classList.add('hidden');
        signoutBtn.classList.remove('hidden');
      } else {
        userPill.classList.add('hidden');
        signinBtn.classList.remove('hidden');
        signoutBtn.classList.add('hidden');
      }
    }

    async function handleSignOut() {
      await sb.auth.signOut();
      currentUser = null;
      updateNav();
      showView('landing');
    }

    // ============================================================
    // DATABASE
    // ============================================================
    async function saveCode(codeData) {
      const { data, error } = await sb.from('polish_codes').insert(codeData).select().single();
      return { data, error };
    }

    async function getUserCodes(userId) {
      const { data, error } = await sb.from('polish_codes')
        .select('*').eq('user_id', userId)
        .order('created_at', { ascending: false });
      return { data: data || [], error };
    }

    async function deleteCodeById(codeId) {
      const { error } = await sb.from('polish_codes').delete().eq('id', codeId);
      return { error };
    }

    async function getStats(userId) {
      const { data } = await sb.from('polish_codes')
        .select('genre, is_refinement, created_at').eq('user_id', userId);
      if (!data) return { totalCodes: 0, refinements: 0, daysActive: 0, favoriteGenre: '—' };
      const totalCodes = data.length;
      const refinements = data.filter(c => c.is_refinement).length;
      const uniqueDays = new Set(data.map(c => c.created_at.split('T')[0]));
      const daysActive = uniqueDays.size;
      const genreCount = {};
      data.forEach(c => { genreCount[c.genre] = (genreCount[c.genre] || 0) + 1; });
      const favoriteGenre = Object.keys(genreCount).reduce((a, b) =>
        genreCount[a] > genreCount[b] ? a : b, '—');
      return { totalCodes, refinements, daysActive, favoriteGenre };
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function copyToClipboard(text, message) {
      navigator.clipboard.writeText(text).then(() => showToast(message));
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function genreName(id) {
      return GENRES.find(g => g.id === id)?.name || id;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

      else if (view === 'auth') main.innerHTML = renderAuth();
      else if (view === 'quiz_genre') main.innerHTML = renderQuizGenre();
      else if (view === 'quiz_questions') main.innerHTML = renderQuizQuestion();
      else if (view === 'result') main.innerHTML = renderResult();
      else if (view === 'dashboard') renderDashboard();
      else if (view === 'learn') main.innerHTML = renderLearn();
    }

    function renderLanding() {
      return `
        <div class="eyebrow">Creative Navigation</div>
        <h1>Your prose, in <em>your voice.</em><br />Not the AI's default.</h1>
        <p class="lead">Take the quiz. Get a polish code tuned to your style. Use it in Claude or ChatGPT — and watch generic AI writing transform into prose that sounds like you.</p>
        <div class="spacer"></div>
        <div class="action-row">
          <button class="btn primary" onclick="startQuiz()">Get Started → Free</button>
          <button class="btn ghost" onclick="showView('auth')">I have an account</button>
        </div>
        <div class="spacer-lg"></div>
        <div class="card">
          <h3>How It Works</h3>
          <p>1. Take a 5-question quiz about how you write.</p>
          <p>2. Get a personalized polish code (a YAML config).</p>
          <p>3. Save it to your account. Build a library of voice configs over time.</p>
          <p>4. Use it in Claude or ChatGPT to polish your drafts.</p>
          <p style="margin-bottom: 0;">5. Same draft + different code = completely different voice.</p>
        </div>
      `;
    }

    function renderAuth() {
      return `
        <div class="auth-card">
          <div class="eyebrow center" id="auth-eyebrow">Create Account</div>
          <h2 class="center" id="auth-title">Save Your Codes.</h2>
          <p class="dim center" id="auth-subtitle">One account stores every polish code you generate.</p>
          <div class="spacer"></div>
          <div class="form-row">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com" />
          </div>
          <div class="form-row">
            <label>Password</label>
            <input type="password" id="auth-password" placeholder="At least 6 characters" />
          </div>
          <div id="auth-error"></div>
          <button class="btn primary" style="width: 100%;" onclick="handleAuth()" id="auth-submit">Create Account →</button>
          <div class="auth-toggle" id="auth-toggle">
            Already have an account? <a onclick="toggleAuthMode()">Sign in</a>
          </div>
        </div>
      `;
    }

    let authMode = 'signup';
    function toggleAuthMode() {
      authMode = authMode === 'signup' ? 'signin' : 'signup';
      document.getElementById('auth-eyebrow').textContent = authMode === 'signup' ? 'Create Account' : 'Sign In';
      document.getElementById('auth-title').textContent = authMode === 'signup' ? 'Save Your Codes.' : 'Welcome Back.';
      document.getElementById('auth-subtitle').textContent = authMode === 'signup' ? 'One account stores every polish code you generate.' : 'Pick up where you left off.';
      document.getElementById('auth-submit').textContent = authMode === 'signup' ? 'Create Account →' : 'Sign In →';
      document.getElementById('auth-toggle').innerHTML = authMode === 'signup'
        ? 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>'
        : 'New here? <a onclick="toggleAuthMode()">Create account</a>';
    }

    async function handleAuth() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errDiv = document.getElementById('auth-error');
      errDiv.innerHTML = '';
      if (!email || !password) {
        errDiv.innerHTML = '<div class="error">Email and password required</div>';
        return;
      }
      if (password.length < 6) {
        errDiv.innerHTML = '<div class="error">Password must be at least 6 characters</div>';
        return;
      }
      const fn = authMode === 'signup'
        ? sb.auth.signUp({ email, password })
        : sb.auth.signInWithPassword({ email, password });
      const { data, error } = await fn;
      if (error) {
        errDiv.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
        return;
      }
      if (authMode === 'signup' && !data.user) {
        errDiv.innerHTML = '<div class="success">Check your email to confirm your account, then sign in.</div>';
        return;
      }
      if (data.user) {
        currentUser = data.user;
        updateNav();
        showView('dashboard');
      }
    }

    function startQuiz() {
      if (!currentUser) { showView('auth'); return; }
      quizState = { genre: null, qIndex: 0, adjustments: {} };
      showView('quiz_genre');
    }

    function renderQuizGenre() {
      return `
        <div class="eyebrow">Step 1 · Pick Your Genre</div>
        <h1>Where does your <em>voice</em> live?</h1>
        <p class="lead">Genre sets the foundation. We'll fine-tune from there.</p>
        <div class="genre-grid">
          ${GENRES.map(g => `
            <div class="genre-card" onclick="selectGenre('${g.id}')">
              <div class="name">${g.name}</div>
              <div class="sub">${g.sub}</div>
            </div>
          `).join('')}
        </div>
        <div class="spacer"></div>
        <button class="btn ghost" onclick="goHome()">← Cancel</button>
      `;
    }

    function selectGenre(id) {
      quizState.genre = id;
      quizState.qIndex = 0;
      quizState.adjustments = {};
      showView('quiz_questions');
    }

    function renderQuizQuestion() {
      const q = QUIZ[quizState.qIndex];
      return `
        <div class="eyebrow">Step 2 · Question ${quizState.qIndex + 1} of ${QUIZ.length}</div>
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-answers">
          ${q.answers.map((a, i) => `
            <button class="quiz-answer" onclick='answerQuestion(${JSON.stringify(a.adj)})'>
              <div class="text">${a.text}</div>
              <div class="sub">${a.sub}</div>
            </button>
          `).join('')}
        </div>
        <div class="spacer"></div>
        <button class="btn ghost" onclick="quizBack()">← Back</button>
      `;
    }

    function quizBack() {
      if (quizState.qIndex > 0) { quizState.qIndex--; showView('quiz_questions'); }
      else { showView('quiz_genre'); }
    }

    function answerQuestion(adj) {
      Object.keys(adj).forEach(key => {
        quizState.adjustments[key] = (quizState.adjustments[key] || 0) + adj[key];
      });
      if (quizState.qIndex < QUIZ.length - 1) {
        quizState.qIndex++;
        showView('quiz_questions');
      } else {
        const g = GENRES.find(x => x.id === quizState.genre);
        const finalSliders = { ...g.profile };
        Object.keys(quizState.adjustments).forEach(key => {
          finalSliders[key] = (finalSliders[key] || 0) + quizState.adjustments[key];
        });
        finalSliders.sentence = Math.max(5, Math.min(25, finalSliders.sentence));
        finalSliders.imagery = Math.max(2, Math.min(15, finalSliders.imagery));
        finalSliders.emotion = Math.max(0, Math.min(60, finalSliders.emotion));
        finalSliders.dialogue = Math.max(10, Math.min(70, finalSliders.dialogue));
        finalSliders.metaphor = Math.max(150, Math.min(1000, finalSliders.metaphor));
        quizState.finalSliders = finalSliders;
        showView('result');
      }
    }

    function renderResult() {
      const isRefinement = !!viewingCode;
      const g = quizState.genre;
      const sliders = quizState.finalSliders;
      const userName = currentUser?.email?.split('@')[0] || 'Writer';
      const codeYaml = generatePolishCode(g, sliders, userName);
      const claudePrompt = generateClaudePrompt(codeYaml);
      window._currentCodeYaml = codeYaml;
      window._currentClaudePrompt = claudePrompt;
      window._currentResultData = { g, sliders };

      return `
        <div class="eyebrow">${isRefinement ? 'Refined Code' : 'Your Polish Code'}</div>
        <h1>Meet <em>your voice.</em></h1>
        <p class="lead">Built from your answers. Yours to use anywhere AI writes prose.</p>
        <div class="spacer"></div>

        <div class="card" style="border-color: var(--accent); background: var(--accent-soft);">
          <h3 style="color: var(--accent); margin-bottom: 16px;">Save This Code</h3>
          <div class="form-row">
            <label>Name (optional)</label>
            <input type="text" id="code-name" placeholder="${genreName(g)} - ${new Date().toLocaleDateString()}" />
          </div>
          <button class="btn primary" onclick="handleSave(${isRefinement})">💾 Save to My Dashboard</button>
        </div>

        <div class="spacer"></div>
        <h3>Your YAML Code</h3>
        <div class="code-block">${escapeHtml(codeYaml)}</div>

        <div class="action-row">
          <button class="btn primary" onclick="copyToClipboard(window._currentClaudePrompt, 'Claude-ready prompt copied')">📋 Copy + Instructions for Claude</button>
          <button class="btn" onclick="copyToClipboard(window._currentCodeYaml, 'YAML code copied')">Copy Code Only</button>
        </div>

        <div class="spacer"></div>
        <h3>Downloads</h3>
        <div class="action-row">
          <button class="btn ghost" onclick="downloadFile('polish_code.yml', window._currentCodeYaml)">⬇ Download YAML</button>
          <button class="btn ghost" onclick="downloadFile('polish_code_instructions.txt', window._currentClaudePrompt)">⬇ Download Instructions</button>
        </div>

        <div class="instructions">
          <h4>How To Use Your Code (3 Simple Steps)</h4>
          <ol>
            <li><strong>Click "Copy + Instructions for Claude"</strong> above. This copies everything you need.</li>
            <li><strong>Open Claude</strong> (claude.ai) or ChatGPT. Paste what you copied as a new message.</li>
            <li><strong>Paste your draft</strong> in the next message. The AI will polish it using YOUR voice config.</li>
          </ol>
          <p style="margin-top: 12px; font-size: 14px; color: var(--ink-dim);">
            Want a deeper explanation? <a style="color: var(--accent); cursor: pointer;" onclick="showView('learn')">Read the full CN guide →</a>
          </p>
        </div>

        <div class="action-row">
          <button class="btn ghost" onclick="goHome()">← Back to Dashboard</button>
        </div>
      `;
    }

    async function handleSave(isRefinement) {
      const name = document.getElementById('code-name').value.trim();
      const { g, sliders } = window._currentResultData;
      const codeYaml = window._currentCodeYaml;
      const { error } = await saveCode({
        user_id: currentUser.id,
        name: name || `${genreName(g)} - ${new Date().toLocaleDateString()}`,
        genre: g,
        sliders,
        code_yaml: codeYaml,
        is_refinement: isRefinement,
        parent_id: viewingCode?.id || null
      });
      if (error) { showToast('Save failed: ' + error.message); }
      else { showToast('Saved to your dashboard'); setTimeout(() => { viewingCode = null; showView('dashboard'); }, 1200); }
    }

    async function renderDashboard() {
      const main = document.getElementById('main-content');
      main.innerHTML = `<div class="eyebrow">Your Studio</div>
        <h1>Welcome back, <em>${currentUser.email.split('@')[0]}.</em></h1>
        <p class="lead">Loading your library…</p>`;
      const [stats, codesResult] = await Promise.all([
        getStats(currentUser.id),
        getUserCodes(currentUser.id)
      ]);
      const codes = codesResult.data;
      main.innerHTML = `
        <div class="eyebrow">Your Studio</div>
        <h1>Welcome back, <em>${currentUser.email.split('@')[0]}.</em></h1>
        <p class="lead">Every code you've built. Every refinement. All in one place.</p>
        <div class="spacer-lg"></div>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="label">Codes Generated</div>
            <div class="value">${stats.totalCodes}</div>
            <div class="sublabel">total in your library</div>
          </div>
          <div class="stat-card">
            <div class="label">Refinements</div>
            <div class="value">${stats.refinements}</div>
            <div class="sublabel">tuned and re-tuned</div>
          </div>
          <div class="stat-card">
            <div class="label">Days Active</div>
            <div class="value">${stats.daysActive}</div>
            <div class="sublabel">building your voice</div>
          </div>
          <div class="stat-card">
            <div class="label">Top Genre</div>
            <div class="value" style="font-size: 24px; line-height: 1.2;">${stats.favoriteGenre === '—' ? '—' : genreName(stats.favoriteGenre)}</div>
            <div class="sublabel">your home base</div>
          </div>
        </div>
        <div class="action-row">
          <button class="btn primary" onclick="startQuiz()">+ Generate New Code</button>
        </div>
        <div class="spacer"></div>
        <h3>Your Saved Codes</h3>
        ${codes.length === 0 ? `
          <div class="empty-state">
            <div class="icon">📜</div>
            <p>No codes yet. Generate your first one to get started.</p>
          </div>
        ` : `
          <div class="codes-list">
            ${codes.map(c => `
              <div class="code-item" onclick='viewSavedCode(${JSON.stringify(c).replace(/'/g, "&apos;")})'>
                <div>
                  <div class="name">${escapeHtml(c.name)}${c.is_refinement ? '<span class="badge">Refined</span>' : ''}</div>
                  <div class="meta">${genreName(c.genre)} · ${formatDate(c.created_at)}</div>
                </div>
                <button class="btn ghost small" onclick='deleteThisCode(event, "${c.id}")'>Delete</button>
              </div>
            `).join('')}
          </div>
        `}
      `;
    }

    function viewSavedCode(c) {
      viewingCode = c;
      quizState = { genre: c.genre, finalSliders: c.sliders, qIndex: 0, adjustments: {} };
      showView('result');
    }

    async function deleteThisCode(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this code? This cannot be undone.')) return;
      const { error } = await deleteCodeById(id);
      if (error) showToast('Delete failed');
      else { showToast('Code deleted'); renderDashboard(); }
    }

    function renderLearn() {
      return `
        <div class="eyebrow">Education Hub</div>
        <h1>How <em>Creative Navigation</em> Works.</h1>
        <p class="lead">Your polish code is more than a config file. It's a deterministic system that turns AI from a generic writing tool into your personal voice engine.</p>
        <div class="spacer"></div>
        <h2>What is a polish code?</h2>
        <p>A polish code is a YAML file containing precise parameters that control how AI rewrites your prose. Sentence rhythm. Imagery density. Emotional amplification. Dialogue ratio. Every measurable element of voice — locked into a transferable file.</p>
        <p>When you paste it into Claude or ChatGPT alongside your draft, the AI doesn't guess what "good" prose looks like. It follows YOUR specifications. Same draft, different code = completely different voice.</p>
        <div class="spacer"></div>
        <h2>Where to use it</h2>
        <p>The code works in any AI that handles long-form prose. The two best:</p>
        <p><strong>Claude</strong> (claude.ai) — recommended. Better at following structural instructions and preserving voice across long passages.</p>
        <p><strong>ChatGPT</strong> (chat.openai.com) — works well, especially GPT-4 or above.</p>
        <div class="spacer"></div>
        <h2>Step-by-step usage</h2>
        <div class="instructions">
          <h4>The 3-Minute Workflow</h4>
          <ol>
            <li><strong>Generate your code</strong> — take the quiz, get your YAML.</li>
            <li><strong>Click "Copy + Instructions for Claude"</strong> — pre-formatted prompt with your code embedded.</li>
            <li><strong>Open Claude or ChatGPT</strong> in a new chat.</li>
            <li><strong>Paste the prompt</strong> as your first message.</li>
            <li><strong>Paste your draft</strong> as the next message.</li>
            <li><strong>Get polished prose back</strong> in your voice.</li>
          </ol>
        </div>
        <div class="spacer"></div>
        <h2>Why CN is different</h2>
        <p>Other AI writing tools generate content from scratch — that's why publishers reject AI work. CN does the opposite. <strong>You</strong> bring the story, the characters, the emotional truth. The AI just executes your stylistic specifications.</p>
        <p>Result: 100% human creativity. Professional-quality prose. Same byline. Same voice. Just amplified.</p>
        <div class="spacer"></div>
        <button class="btn ghost" onclick="goHome()">← Back</button>
      `;
    }

    // ============================================================
    // INIT
    // ============================================================
    sb.auth.onAuthStateChange((_event, session) => {
      currentUser = session?.user || null;
      updateNav();
    });

    checkUser().then(() => {
      if (!currentUser) showView('landing');
    });
  </script>

</body>
</html>
